syntax = "proto3";

package notification;

option go_package = "github.com/alimarzban99/notification-service/proto;notificationpb";

service NotificationService {

  rpc SendEmail (SendEmailRequest)
      returns (SendEmailResponse);

  rpc SendProcessingCompleted (
      ProcessingCompletedRequest
      ) returns (
      ProcessingCompletedResponse
      );
}

message SendEmailRequest {

  string email = 1;

  string subject = 2;

  string body = 3;
}

message SendEmailResponse {

  bool success = 1;

  string message = 2;
}

message ProcessingCompletedRequest {

  string video_id = 1;

  string email = 2;

  string filename = 3;

  string status = 4;
}

message ProcessingCompletedResponse {

  bool success = 1;

  string message = 2;
}